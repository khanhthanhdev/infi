name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release Notes
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes from git log
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)

          if [ -n "$PREV_TAG" ]; then
            log=$(git log --no-merges --pretty=format:"- %s" "${PREV_TAG}..HEAD")
            notes="${log}"$'\n\n'"**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
          else
            notes=$(git log --no-merges --pretty=format:"- %s")
          fi

          macos_section=$(cat <<'EOF'

          ---
          ### macOS Installation

          This app is **not signed** with an Apple Developer certificate. On first launch:

          1. Open the `.dmg` and drag **Infi** to your **Applications** folder.
          2. Right-click **Infi** → **Open** → click **Open** in the dialog.
             _Or_ run: `xattr -cr /Applications/Infi.app`

          After the first open it will launch normally.
          EOF
          )

          notes="${notes}${macos_section}"

          {
            echo 'body<<INFI_NOTES_EOF'
            echo "$notes"
            echo 'INFI_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

  release:
    name: Release ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "macOS (Apple Silicon)"
            platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
          - label: "macOS (Intel)"
            platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"
          - label: "Linux (x86_64)"
            platform: "ubuntu-24.04"
            args: ""
            rust-targets: ""
          - label: "Windows (x86_64)"
            platform: "windows-latest"
            args: "--target x86_64-pc-windows-msvc"
            rust-targets: "x86_64-pc-windows-msvc"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        run: bun install
        working-directory: frontend

      - name: Build with Tauri action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing — DISABLED. Produces an unsigned .app/.dmg.
          # Users will need to right-click → Open (or `xattr -cr /Applications/Infi.app`)
          # to bypass Gatekeeper on first launch.
          #
          # To re-enable signing, add these env vars with real values:
          #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          #   APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: .
          tagName: v__VERSION__
          releaseName: "Infi v__VERSION__"
          releaseBody: ${{ needs.prepare.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}



  publish-winget:
    name: Submit to winget-pkgs
    needs: release
    runs-on: windows-latest
    # Requires repo variable WINGET_PUBLISH=true and a fine-grained PAT in
    # secrets.WINGET_TOKEN with `public_repo` scope on a fork of microsoft/winget-pkgs.
    # See: https://github.com/vedantmgoyal9/winget-releaser
    if: ${{ vars.WINGET_PUBLISH == 'true' }}
    steps:
      - name: Get version
        id: release
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Submit package to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: khanhthanhdev.Infi
          version: ${{ steps.release.outputs.version }}
          # Tauri NSIS installer asset name (x64-setup.exe).
          installers-regex: '_x64-setup\.exe$'
          release-tag: ${{ github.ref_name }}
          token: ${{ secrets.WINGET_TOKEN }}

  publish-homebrew:
    name: Bump Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    # TEMPORARILY DISABLED
    if: false
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: khanhthanhdev/homebrew-tap
          token: ${{ secrets.GH_TOKEN }}
          path: homebrew-tap

      - name: Get release info
        id: release
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update Formula and Cask
        env:
          VERSION: ${{ steps.release.outputs.version }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd homebrew-tap

          # Get SHA256 for Linux AppImage
          APPIMAGE_URL="https://github.com/khanhthanhdev/infi/releases/download/v${VERSION}/Infi_${VERSION}_amd64.AppImage"
          APPIMAGE_SHA=$(curl -sL "$APPIMAGE_URL" | sha256sum | cut -d' ' -f1)

          # Get SHA256 for macOS ARM
          ARM_URL="https://github.com/khanhthanhdev/infi/releases/download/v${VERSION}/Infi_aarch64.app.tar.gz"
          ARM_SHA=$(curl -sL "$ARM_URL" | sha256sum | cut -d' ' -f1)

          # Get SHA256 for macOS Intel
          INTEL_URL="https://github.com/khanhthanhdev/infi/releases/download/v${VERSION}/Infi_x64.app.tar.gz"
          INTEL_SHA=$(curl -sL "$INTEL_URL" | sha256sum | cut -d' ' -f1)

          # Update Formula
          sed -i "s|url \"https://github.com/khanhthanhdev/infi/releases/download/v[^\"]*\"|url \"https://github.com/khanhthanhdev/infi/releases/download/v${VERSION}/Infi_${VERSION}_amd64.AppImage\"|" Formula/infi.rb
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" Formula/infi.rb
          sed -i "s/sha256 \"[^\"]*\"/sha256 \"${APPIMAGE_SHA}\"/" Formula/infi.rb

          # Update Cask
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" Casks/infi.rb
          sed -i "s/sha256 arm:   \"[^\"]*\"/sha256 arm:   \"${ARM_SHA}\"/" Casks/infi.rb
          sed -i "s/intel: \"[^\"]*\"/intel: \"${INTEL_SHA}\"/" Casks/infi.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Bump infi to v${VERSION}"
          git push
