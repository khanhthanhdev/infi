name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release Notes
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes from git log
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)

          if [ -n "$PREV_TAG" ]; then
            log=$(git log --no-merges --pretty=format:"- %s" "${PREV_TAG}..HEAD")
            notes="${log}"$'\n\n'"**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
          else
            notes=$(git log --no-merges --pretty=format:"- %s")
          fi

          {
            echo 'body<<INFI_NOTES_EOF'
            echo "$notes"
            echo 'INFI_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

  release:
    name: Release ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: "ubuntu-24.04"
            args: ""
            rust-targets: ""
          - platform: "windows-latest"
            args: "--target x86_64-pc-windows-msvc"
            rust-targets: "x86_64-pc-windows-msvc"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        run: bun install
        working-directory: frontend

      - name: Build with Tauri action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing — only enabled when MACOS_SIGNING_ENABLED repo variable is "true".
          # Set vars.MACOS_SIGNING_ENABLED=true once MACOS_CERTIFICATE / MACOS_CERTIFICATE_PWD /
          # MACOS_IDENTITY secrets are configured with a valid Developer ID Application cert.
          # See: https://tauri.app/distribute/sign/macos/
          APPLE_CERTIFICATE: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && secrets.MACOS_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && secrets.MACOS_CERTIFICATE_PWD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && secrets.MACOS_IDENTITY || '' }}
          # macOS notarization — only enabled with signing.
          APPLE_ID: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && secrets.APPLE_TEAM_ID || '' }}
        with:
          projectPath: .
          tagName: v__VERSION__
          releaseName: "Infi v__VERSION__"
          releaseBody: ${{ needs.prepare.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Create Linux tarball
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          # Find the binary in the Tauri build output
          BINARY_PATH=$(find target/release -name "infi" -type f -executable | head -n 1)

          if [ -z "$BINARY_PATH" ]; then
            echo "Error: Could not find infi binary"
            exit 1
          fi

          # Create tarball
          mkdir -p dist
          tar -czf dist/infi-linux.tar.gz -C $(dirname "$BINARY_PATH") $(basename "$BINARY_PATH")

          echo "Created tarball: dist/infi-linux.tar.gz"
          ls -lh dist/infi-linux.tar.gz

      - name: Upload Linux tarball to release
        if: matrix.platform == 'ubuntu-24.04'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/infi-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-winget:
    name: Submit to winget-pkgs
    needs: release
    runs-on: windows-latest
    # Requires repo variable WINGET_PUBLISH=true and a fine-grained PAT in
    # secrets.WINGET_TOKEN with `public_repo` scope on a fork of microsoft/winget-pkgs.
    # See: https://github.com/vedantmgoyal9/winget-releaser
    if: ${{ vars.WINGET_PUBLISH == 'true' }}
    steps:
      - name: Get version
        id: release
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Submit package to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: puemos.Infi
          version: ${{ steps.release.outputs.version }}
          # Tauri NSIS installer asset name (x64-setup.exe).
          installers-regex: '_x64-setup\.exe$'
          release-tag: ${{ github.ref_name }}
          token: ${{ secrets.WINGET_TOKEN }}

  publish-homebrew:
    name: Bump Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: puemos/homebrew-tap
          token: ${{ secrets.GH_TOKEN }}
          path: homebrew-tap

      - name: Get release info
        id: release
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update Formula and Cask
        env:
          VERSION: ${{ steps.release.outputs.version }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd homebrew-tap

          # Get SHA256 for Linux AppImage
          APPIMAGE_URL="https://github.com/puemos/infi/releases/download/v${VERSION}/Infi_${VERSION}_amd64.AppImage"
          APPIMAGE_SHA=$(curl -sL "$APPIMAGE_URL" | sha256sum | cut -d' ' -f1)

          # Get SHA256 for macOS ARM
          ARM_URL="https://github.com/puemos/infi/releases/download/v${VERSION}/Infi_aarch64.app.tar.gz"
          ARM_SHA=$(curl -sL "$ARM_URL" | sha256sum | cut -d' ' -f1)

          # Get SHA256 for macOS Intel
          INTEL_URL="https://github.com/puemos/infi/releases/download/v${VERSION}/Infi_x64.app.tar.gz"
          INTEL_SHA=$(curl -sL "$INTEL_URL" | sha256sum | cut -d' ' -f1)

          # Update Formula
          sed -i "s|url \"https://github.com/puemos/infi/releases/download/v[^\"]*\"|url \"https://github.com/puemos/infi/releases/download/v${VERSION}/Infi_${VERSION}_amd64.AppImage\"|" Formula/infi.rb
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" Formula/infi.rb
          sed -i "s/sha256 \"[^\"]*\"/sha256 \"${APPIMAGE_SHA}\"/" Formula/infi.rb

          # Update Cask
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" Casks/infi.rb
          sed -i "s/sha256 arm:   \"[^\"]*\"/sha256 arm:   \"${ARM_SHA}\"/" Casks/infi.rb
          sed -i "s/intel: \"[^\"]*\"/intel: \"${INTEL_SHA}\"/" Casks/infi.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Bump infi to v${VERSION}"
          git push
