name: Landing CI

on:
  push:
    branches: ["main"]
    paths:
      - "landing/**"
      - ".github/workflows/landing-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "landing/**"
      - ".github/workflows/landing-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build landing
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install landing dependencies
        working-directory: landing
        run: bun install

      - name: Build landing site
        working-directory: landing
        run: bun run build
