:00"},{"id":"2864164c-5f9a-4527-993f-ed58a43bad98","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid_v2:row_10","display_name":"FY2026 Profit Target","metric_name":"FY2026 Profit Target","definition":"The company's publicly announced net profit goal for fiscal year 2026, set by management as forward guidance.","meaning":"Management profit targets signal internal confidence in the business outlook. Meeting or exceeding targets supports stock price confidence.","value_interpretation":"FY2026 Profit Target in KPI grid v2 represents management's commitment to a specific earnings outcome for market expectations.","good_threshold":"Targets should exceed prior-year results by 10%+ to justify growth expectations.","current_value_assessment":"FY2026 Profit Target in KPI grid v2 shows management's forward guidance for analyst calibration.","source_id":null,"created_at":"2026-05-03T09:54:34.125284213+00:00"},{"id":"9e38fa50-0625-4c91-95f8-61bf852b4fa8","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid_v2:row_11","display_name":"Land Bank","metric_name":"Land Bank","definition":"The total area of land owned or controlled by the developer for current and future project development, measured in hectares.","meaning":"A large land bank provides a long runway for future project launches. The quality and location of the land matters as much as the total area.","value_interpretation":"Land Bank in KPI grid v2 measures the strategic asset base that underpins the company's development pipeline.","good_threshold":"Context-dependent on company scale; for a top-tier Vietnamese developer, several thousand hectares is substantial.","current_value_assessment":"Land Bank in KPI grid v2 shows the total development area available for the company's multi-year pipeline.","source_id":null,"created_at":"2026-05-03T09:54:36.939546485+00:00"},{"id":"4bfc4191-76f8-4437-938e-468af3c2d466","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid_v2:col_0","display_name":"Metric","metric_name":"Metric","definition":"The label identifying which financial metric is displayed in each row of the KPI grid v2 table.","meaning":"The Metric column provides the descriptive label for each row, allowing readers to identify what financial measure the corresponding values refer to.","value_interpretation":"The Metric column is a descriptive label that identifies each financial measure in KPI grid v2 for easy reference.","good_threshold":"N/A — this is a label column, not a numeric metric.","current_value_assessment":"The Metric column labels each row in KPI grid v2, identifying what financial measure is being reported.","source_id":null,"created_at":"2026-05-03T09:54:45.495124143+00:00"},{"id":"0a355ebe-8e3a-48fc-8573-4fc8e0d72e56","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid_v2:col_1","display_name":"Value","metric_name":"Value","definition":"The numeric value of the financial metric for the reporting period, expressed in the unit specified in the adjacent column.","meaning":"The Value column shows the actual reported figure for each metric. Compare against Prior Period and Change % to assess trends.","value_interpretation":"The Value column presents the raw numeric data for each KPI, interpreted alongside unit, period, and change columns.","good_threshold":"N/A — interpretation depends on the specific metric shown in each row.","current_value_assessment":"The Value column displays the numeric value of each financial metric in KPI grid v2 for the current reporting period.","source_id":null,"created_at":"2026-05-03T09:54:48.049386381+00:00"},{"id":"81d6043d-1699-4d66-b696-4a6fe7059051","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid_v2:col_2","display_name":"Unit","metric_name":"Unit","definition":"The measurement unit for each financial metric, such as VND billion for monetary values, percentage for margins, or hectares for land area.","meaning":"The Unit column is essential for correctly interpreting the Value column. Without knowing the unit, the raw number has no meaning.","value_interpretation":"The Unit column contextualizes each metric's value, ensuring readers correctly interpret the scale of the numbers presented.","good_threshold":"N/A — this is a descriptor column that provides context for interpreting numeric values.","current_value_assessment":"The Unit column clarifies the measurement unit (VND billion, %, hectares) for each metric in KPI grid v2.","source_id":null,"created_at":"2026-05-03T09:54:50.545437547+00:00"},{"id":"ab0fcccb-4852-45f9-b4b1-6c2107008949","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid_v2:col_3","display_name":"Period","metric_name":"Period","definition":"The time period (fiscal year, quarter, or date) to which the reported metric value applies.","meaning":"The Period column tells you when the reported value applies, critical for making meaningful period-over-period comparisons.","value_interpretation":"The Period column anchors each metric to a specific time frame, enabling accurate trend analysis.","good_threshold":"N/A — this is a temporal reference column, not a numeric metric.","current_value_assessment":"The Period column identifies the time frame for which each metric value is reported in KPI grid v2.","source_id":null,"created_at":"2026-05-03T09:54:53.013026122+00:00"},{"id":"6b8cea0d-3322-4756-a6c9-8e52901d9db1","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid_v2:col_4","display_name":"Prior Period","metric_name":"Prior Period","definition":"The value of the same metric from the immediately preceding reporting period, used as the baseline for calculating change.","meaning":"Prior Period values allow readers to assess trends by comparing current values against the previous period's baseline.","value_interpretation":"The Prior Period column provides the baseline for calculating percentage change in each metric, revealing performance trends.","good_threshold":"N/A — this is a reference column for calculating the Change % metric.","current_value_assessment":"The Prior Period column shows the previous period's value in KPI grid v2 for change calculation.","source_id":null,"created_at":"2026-05-03T09:54:55.729611939+00:00"},{"id":"ca934e30-12e3-4eab-850b-3baf94a72251","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid_v2:col_5","display_name":"Change %","metric_name":"Change %","definition":"The percentage change in a metric from the prior period to the current period, calculated as (Current - Prior) / Prior × 100.","meaning":"Change % is the most actionable column because it shows momentum. Positive changes in revenue, profit, and margins are favorable. The magnitude of change matters significantly.","value_interpretation":"The Change % column quantifies the rate of improvement or deterioration in each KPI, providing the clearest signal of business momentum.","good_threshold":"Positive change is generally favorable for revenue and profit metrics; context-dependent for leverage ratios.","current_value_assessment":"The Change % column in KPI grid v2 shows period-over-period movement, highlighting which measures are improving or deteriorating.","source_id":null,"created_at":"2026-05-03T09:54:58.529822150+00:00"},{"id":"2a18c866-01fa-4589-bd54-dbe9c33bcf23","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid_v2:col_6","display_name":"Source","metric_name":"Source","definition":"The data source (e.g., company filings, analyst estimates, market data) from which each metric value is derived.","meaning":"The Source column provides transparency about data origins. Company-reported figures come from official filings, while consensus estimates come from analyst surveys.","value_interpretation":"The Source column ensures each metric is traceable to its origin, supporting data credibility.","good_threshold":"N/A — this is a provenance column, not a numeric metric.","current_value_assessment":"The Source column in KPI grid v2 identifies where each metric's data originates for transparency.","source_id":null,"created_at":"2026-05-03T09:55:00.867865100+00:00"},{"id":"0ca9829b-b33e-41fe-87c2-56c5320ff96e","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_peer_comparison:col_0","display_name":"Company","metric_name":"Company","definition":"The name of each company included in the peer comparison analysis, allowing readers to identify which competitors or comparable firms are being evaluated.","meaning":"The Company column lists the comparable firms used to benchmark Vinhomes' valuation and financial metrics. Peer selection matters — comparing against similar-scale developers in the same market provides the most relevant insights.","value_interpretation":"The Company column identifies each peer in the comparison set, enabling readers to assess which firms are the most relevant benchmarks.","good_threshold":"N/A — this is a label column identifying the peer companies.","current_value_assessment":"The Company column in the peer comparison table identifies the name of each company being compared to Vinhomes.","source_id":null,"created_at":"2026-05-03T09:55:04.129771242+00:00"},{"id":"38578b58-614d-4589-8abe-e56b31252b67","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_peer_comparison:col_1","display_name":"Ticker","metric_name":"Ticker","definition":"The stock exchange ticker symbol for each company, used to uniquely identify the stock for trading and data lookup purposes.","meaning":"The Ticker column provides the standardized stock symbol for each peer, allowing readers to look up real-time prices and additional data on financial platforms.","value_interpretation":"The Ticker column is a stock identifier that enables readers to track each peer company on exchanges and financial data platforms.","good_threshold":"N/A — this is an identifier column, not a numeric metric.","current_value_assessment":"The Ticker column shows the stock exchange ticker symbol for each peer company in the comparison.","source_id":null,"created_at":"2026-05-03T09:55:07.023766867+00:00"},{"id":"fb745941-c3c0-4efa-8231-53dbf9fd4e2f","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_peer_comparison:col_2","display_name":"Market Cap (USD m)","metric_name":"Market Cap (USD m)","definition":"The total market value of each company's outstanding shares expressed in US dollars (millions), enabling size comparison across companies listed on different exchanges.","meaning":"Converting market cap to USD allows direct comparison of company sizes across different currencies and exchanges. Larger market cap generally indicates more established companies with greater analyst coverage.","value_interpretation":"Market Cap (USD m) normalizes company sizes to a common currency, enabling fair cross-border peer comparison.","good_threshold":"N/A — market cap is a size descriptor; relative valuation metrics (P/E, P/B) matter more for investment decisions.","current_value_assessment":"Market Cap (USD m) in the peer comparison shows the dollar-denominated size of each company for cross-border comparison.","source_id":null,"created_at":"2026-05-03T09:55:10.792377802+00:00"},{"id":"6ff59bc3-878f-4e65-8335-8d079f3d15ca","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_peer_comparison:col_3","display_name":"P/E 2025","metric_name":"P/E 2025","definition":"The price-to-earnings ratio calculated using each company's 2025 actual earnings, showing how the market values past profitability.","meaning":"P/E 2025 uses confirmed historical earnings. Comparing this across peers reveals which companies are trading at a premium or discount to their reported earnings. A lower P/E relative to peers may indicate undervaluation.","value_interpretation":"P/E 2025 in the peer comparison enables readers to assess whether Vinhomes is relatively cheap or expensive compared to competitors on historical earnings.","good_threshold":"Below 15x is often considered value for mature developers; above 25x may indicate growth expectations or overvaluation.","current_value_assessment":"P/E 2025 in the peer comparison shows the trailing valuation multiple for each company based on 2025 actual earnings.","source_id":null,"created_at":"2026-05-03T09:55:15.194296708+00:00"},{"id":"cc0e7235-30fd-4947-b4ac-7c208957fe23","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_peer_comparison:col_4","display_name":"P/E 2026F","metric_name":"P/E 2026F","definition":"The price-to-earnings ratio calculated using analysts' consensus estimates of 2026 earnings, reflecting market expectations for future profitability.","meaning":"Forward P/E shows what investors are paying for expected future earnings. Comparing forward P/E across peers reveals which companies have the highest growth expectations priced in. A lower forward P/E relative to peers may indicate undervaluation if growth materializes.","value_interpretation":"P/E 2026F in the peer comparison enables readers to assess relative valuation based on forward earnings expectations across the sector.","good_threshold":"Below 12x forward P/E is considered attractive for developers; above 20x requires strong growth justification.","current_value_assessment":"P/E 2026F in the peer comparison shows the forward valuation multiple based on analysts' 2026 earnings estimates.","source_id":null,"created_at":"2026-05-03T09:55:18.380795631+00:00"},{"id":"c9a8f00d-0e03-4fa5-8e79-c171446f666e","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_peer_comparison:col_5","display_name":"P/B 2025","metric_name":"P/B 2025","definition":"The price-to-book ratio using 2025 book value, showing how much investors pay per unit of the company's net asset value (equity).","meaning":"P/B compares the market's valuation of a company to the accounting value of its net assets. For real estate developers, P/B is particularly relevant because land banks are significant assets. A low P/B relative to peers may indicate the market underestimates asset values.","value_interpretation":"P/B 2025 in the peer comparison reveals how the market values each company's asset base relative to competitors.","good_threshold":"Below 1.0x may indicate undervaluation or distress; 1.0–2.0x is typical for healthy developers; above 3.0x requires strong asset quality justification.","current_value_assessment":"P/B 2025 in the peer comparison shows the price-to-book ratio for each company, indicating how the market values their net assets.","source_id":null,"created_at":"2026-05-03T09:55:22.369646386+00:00"},{"id":"0cf21f6e-f93e-40a3-85d9-13b86f99512e","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_peer_comparison:col_6","display_name":"ROE %","metric_name":"ROE %","definition":"Return on Equity expressed as a percentage — net income divided by shareholders' equity — measuring how efficiently each company generates profit from invested capital.","meaning":"ROE measures management's effectiveness at turning shareholder capital into profits. Comparing ROE across peers reveals which companies are most efficient at generating returns. However, very high ROE can be driven by excessive leverage rather than true operational excellence.","value_interpretation":"ROE % in the peer comparison ranks each company's capital efficiency, helping identify which peers deliver the best returns to shareholders.","good_threshold":"Above 15% is generally considered good; above 20% is excellent. Compare within the same industry for meaningful conclusions.","current_value_assessment":"ROE % in the peer comparison shows each company's return on equity, enabling efficiency comparison across peers.","source_id":null,"created_at":"2026-05-03T09:55:25.946973916+00:00"},{"id":"d36b4ec0-e02d-4448-b945-ca6c09e275c6","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_peer_comparison:col_7","display_name":"Source","metric_name":"Source","definition":"The data source from which each peer company's financial metrics are derived, such as company filings, Bloomberg, or analyst consensus.","meaning":"The Source column ensures transparency by identifying where each peer's data comes from. Consistency in data sources across peers ensures a fair comparison.","value_interpretation":"The Source column in the peer comparison ensures each company's metrics are traceable and comparable on a consistent basis.","good_threshold":"N/A — this is a provenance column, not a numeric metric.","current_value_assessment":"The Source column in the peer comparison identifies data origins for each peer's financial metrics.","source_id":null,"created_at":"2026-05-03T09:55:28.809780903+00:00"},{"id":"3a9d6c35-f234-46ca-8a27-07fbf23248d7","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_ratio_snapshot:row_0","display_name":"Trailing P/E","metric_name":"Trailing P/E","definition":"The current share price divided by the actual earnings per share over the most recent 12-month period, using confirmed historical earnings.","meaning":"Trailing P/E uses confirmed earnings, making it more reliable than forward estimates. It may not reflect the company's current trajectory if earnings are growing or declining rapidly. A large gap between trailing and forward P/E signals expected earnings inflection.","value_interpretation":"Trailing P/E in the ratio snapshot provides a backward-looking valuation benchmark based on confirmed earnings.","good_threshold":"20–25x is typical for growth-oriented emerging market stocks; above 30x may signal overvaluation.","current_value_assessment":"Trailing P/E in the ratio snapshot shows the valuation based on the most recent 12 months of actual earnings.","source_id":null,"created_at":"2026-05-03T09:55:35.163431467+00:00"},{"id":"33da585c-16ef-4543-b35d-68e02c428f18","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_ratio_snapshot:row_1","display_name":"Forward P/E","metric_name":"Forward P/E","definition":"The current share price divided by analysts' consensus estimate of earnings per share for the next 12 months.","meaning":"Forward P/E tells you how much investors are paying for each unit of expected future earnings. A lower forward P/E relative to peers or history may indicate undervaluation, assuming earnings estimates are reliable.","value_interpretation":"Forward P/E in the ratio snapshot reflects market expectations for future earnings growth and is the primary valuation metric for growth investors.","good_threshold":"Below 15x is often considered attractive for large-cap emerging market developers; above 25x may indicate overvaluation.","current_value_assessment":"Forward P/E in the ratio snapshot shows the valuation based on analysts' consensus earnings estimates for the next 12 months.","source_id":null,"created_at":"2026-05-03T09:55:38.128512998+00:00"}],"holding_reviews":[],"allocation_reviews":[],"portfolio_risks":[],"rebalancing_suggestions":[],"portfolio_scenario_analyses":[],"portfolio_expected_return_models":[]})return null;if(typeof e==`string`)try{return JSON.parse(e)}catch{return null}return e}function Uv({title:e,body:t}){return(0,R.jsxs)(`div`,{className:`mx-au
