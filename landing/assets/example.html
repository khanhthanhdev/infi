":"x","period":"TTM","source_id":"src_yahoo_vhm"},{"group":"Profitability","metric":"Gross Margin","value":"29","unit":"%","period":"FY2025","source_id":"src_vinhomes_q4_2025"},{"group":"Profitability","metric":"Net Profit Margin","value":"~27","unit":"%","period":"FY2025","source_id":"src_vinhomes_q4_2025"},{"group":"Profitability","metric":"ROE","value":"17.4","unit":"%","period":"FY2025E","source_id":"src_vietcap_dec2025"},{"group":"Leverage","metric":"Net Debt/Equity","value":"41","unit":"%","period":"FY2025E","source_id":"src_vietcap_dec2025"},{"group":"Growth","metric":"Revenue Growth","value":"51","unit":"%","period":"FY2025","source_id":"src_vinhomes_q4_2025"},{"group":"Growth","metric":"PAT Growth","value":"20","unit":"%","period":"FY2025","source_id":"src_vinhomes_q4_2025"}],"series":[],"evidence_ids":["src_yahoo_vhm","src_vietcap_dec2025","src_vinhomes_q4_2025"],"display_order":3,"created_at":"2026-05-03T09:43:15.716796909+00:00"}],"blocks":[{"id":"block_thesis","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","kind":"thesis","title":"Vinhomes: Scale Leader Riding a Cyclical Property Recovery","body":"Vinhomes is Vietnam's largest listed real estate developer and a subsidiary of Vingroup (VIC), the country's largest private conglomerate. The investment case rests on three pillars: **unmatched scale** in land bank and brand, a **cyclical earnings inflection** driven by record contracted sales, and **structural tailwinds** from Vietnam's urbanization and FDI-driven economic growth.\n\nFY2025 marked a breakout year: revenue surged **[[51]]%** to **[[154,102]]B** VND, while net profit grew **[[20]]%** to **[[42,111]]B** VND, exceeding management targets. Contracted sales doubled to **[[205,300]]B** VND, creating **[[186,400]]B** VND in unbilled sales that provide strong revenue visibility into 2026-2027. Q1 2026 results were even more striking — revenue hit **[[65,114]]B** VND (+**[[315]]%** YoY) and net income reached **[[25,552]]B** VND (+**[[866]]%** YoY), as mega-project handovers accelerated.\n\nThe company targets **[[59,400]]B** VND in net profit for FY2026 (+**[[41]]%** vs FY2025), which would be a new record. At a forward P/E of **[[13.77]]x** (Yahoo) or **[[10.4]]x** on consensus 2026 estimates (Vietcap), the stock appears to offer value relative to its growth trajectory and dominant market position, though the relationship with parent Vingroup introduces complexity that warrants a governance discount.\n\nThe key risk is that Vinhomes' earnings are highly cyclical and tied to large project handover timing, which can create lumpy quarterly results and mask underlying demand trends.","evidence_ids":["src_vinhomes_q4_2025","src_vinhomes_q1_2026","src_theinvestor_vinhomes_2026_target","src_vietcap_dec2025","src_yahoo_vhm"],"confidence":0.72,"importance":"high","display_order":1,"created_at":"2026-05-03T09:49:41.318919469+00:00"},{"id":"block_financials","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","kind":"financials","title":"Financial Profile: Record Sales Drive Earnings Acceleration","body":"Vinhomes' financial trajectory shows a company emerging strongly from Vietnam's 2022-2023 property downturn. FY2024 revenue was VND**[[102,323]]B** with PAT of VND**[[35,073]]B**, reflecting the sector-wide slowdown.\n\n**FY2025 performance** was transformative. Revenue reached **[[154,102]]B** VND (+**[[51]]%** YoY), driven primarily by property deliveries at Vinhomes Green Paradise Can Gio and Ocean Park 2-3. Gross profit was **[[45,432]]B** VND, though gross margin compressed to **[[29]]%** from **[[32]]%** in FY2024 due to a shift in project mix and lower BCC profit sharing (VND**[[8,739]]B** vs **[[19,137]]B** in FY2024).\n\n**Revenue composition** is important to understand. Vinhomes reports both direct property sales and business cooperation contract (BCC) profit sharing from Vingroup-linked projects. On an adjusted basis including BCC and bulk sales, total adjusted revenue was **[[183,923]]B** VND in FY2025. This BCC structure means reported revenue understates the true economic scale of operations.\n\n**Q1 2026** showed extraordinary acceleration: revenue of **[[65,114]]B** VND (+**[[315]]%** YoY) and PAT of **[[25,552]]B** VND (+**[[866]]%** YoY). This reflects concentrated handover timing at mega-projects rather than a sustainable quarterly run-rate. Full-year FY2026 guidance of **[[59,400]]B** VND PAT implies a more moderate H2 2026.\n\n**Balance sheet** total assets were VND**[[564,209]]B** at end-FY2024. Net debt/equity is estimated at **[[41]]%** (Vietcap FY2025F), up from **[[23]]%** in FY2024, reflecting increased project development spending. The company approved a VND**[[4,350]]B** bond issuance in late 2025 to restructure debts. Leverage remains manageable but is trending upward as the company invests heavily in its land bank and project pipeline.","evidence_ids":["src_vinhomes_q4_2025","src_vinhomes_q1_2026","src_vietcap_dec2025"],"confidence":0.75,"importance":"high","display_order":2,"created_at":"2026-05-03T09:48:11.005565921+00:00"},{"id":"block_valuation","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","kind":"valuation","title":"Valuation: Reasonably Priced for Growth, but Discount Warranted","body":"Vinhomes trades at a forward P/E of **[[13.77]]x** (Yahoo consensus) or **[[10.4]]x** on Vietcap's 2026 estimates, with P/B of **[[1.8]]x** on FY2025 estimates. The trailing P/E of **[[26.18]]x** reflects the lumpy nature of property developer earnings and is less meaningful.\n\n**Relative to peers**, Vinhomes commands a significant premium on P/B (**[[1.8]]x** vs peer average **[[1.2]]x**) justified by its superior ROE of **[[17.4]]%** (vs peers at **[[2-5]]%** range). However, on P/E, VHM trades at a discount to smaller peers like KDH (**[[28.9]]x** 2026F) and NLG (**[[25.8]]x** TTM), reflecting the market's governance discount for the Vingroup parent relationship.\n\n**Historical context**: Vietcap's December 2025 report shows consensus forward P/E has compressed from **[[14.4]]x** (2024) to **[[11.2]]x** (2025) and **[[10.4]]x** (2026), even as earnings accelerate. This suggests the market is pricing in some combination of: (a) skepticism about earnings sustainability, (b) governance/related-party discount, and (c) concerns about the BCC revenue recognition model.\n\n**Forward estimates** (Vietcap): Revenue is forecast at **[[190,500]]B** VND (2026F) and **[[202,600]]B** VND (2027F), with NPM improving to **[[30.4]]%** and **[[33.4]]%** respectively. P/E compresses to **[[9.2]]x** on 2027 estimates. If management delivers on its **[[59,400]]B** VND 2026 profit target, the stock at current levels would trade at roughly **[[10]]x** forward earnings — attractive for a market leader in a growing economy, absent governance concerns.\n\n**Key valuation tension**: The stock is cheap on earnings multiples but carries a premium on asset multiples. The market appears to be pricing in both strong near-term earnings and long-term uncertainty about the Vingroup ecosystem's impact on minority shareholders.","evidence_ids":["src_yahoo_vhm","src_vietcap_dec2025","src_mbs_kdh_2026","src_maybank_peers_dec2024"],"confidence":0.7,"importance":"high","display_order":3,"created_at":"2026-05-03T09:43:52.559866364+00:00"},{"id":"block_catalysts","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","kind":"catalysts","title":"Key Catalysts: Mega-Project Pipeline and Macro Tailwinds","body":"**1. Unprecedented contracted sales backlog.** End-FY2025 unbilled sales of **[[186,400]]B** VND (up **[[98]]%** YoY) provide exceptional revenue visibility. This backlog, equivalent to **[[1.2]]x** FY2025 reported revenue, should underpin earnings through 2027 even if new sales slow.\n\n**2. New mega-project launches.** Vinhomes is launching several large-scale projects including Vinhomes Vu Yen (877 ha, Hai Phong), Vinhomes Co Loa (385 ha, Hanoi), and Vinhomes Green Paradise (2,870 ha, Can Gio). These are multi-year developments that could sustain contracted sales above **[[200,000]]B** VND annually. The company's **[[29,500]]** hectare land bank — the largest in Vietnam — provides a decade-plus runway.\n\n**3. Transit-oriented development (TOD) strategy.** Vinhomes is pivoting toward TOD, positioning projects near planned metro and rail infrastructure. The proposed Can Gio Metro Line and Hanoi-Quang Ninh HSR could significantly enhance the value of Green Paradise and Apollo City projects respectively. This is a long-duration catalyst tied to Vietnam's infrastructure buildout.\n\n**4. Vietnam macro tailwinds.** Vietnam's economy grew **[[7.83]]%** in Q1 2026, FDI surged **[[42.9]]%** YoY, and exports to the US grew **[[21.9]]%** in early 2026. Rising incomes, urbanization, and supply chain diversification from China are structural demand drivers for residential real estate. Vietnam's real estate sector has been upgraded to POSITIVE by multiple brokerages.\n\n**5. Dividend resumption potential.** After three years of retained earnings conservation, Vinhomes has signaled willingness to resume dividends, which could attract income-oriented investors and broaden the shareholder base.","evidence_ids":["src_vinhomes_q4_2025","src_theinvestor_vinhomes_2026_target","src_vietnam_macro_2026","src_vietcap_dec2025","src_maybank_peers_dec2024"],"confidence":0.73,"importance":"high","display_order":4,"created_at":"2026-05-03T09:44:01.058160623+00:00"},{"id":"block_risks","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","kind":"risks","title":"Key Risks: Governance, Cyclicality, and Regulatory Uncertainty","body":"**1. Vingroup ecosystem complexity and governance risk.** Vinhomes operates within a complex Vingroup structure involving BCC profit-sharing, bulk sales to related parties, and Chairman Pham Nhat Vuong's multiple spin-off entities (VinSpeed, VinEnergo, Novatech). The Chairman has transferred **[[423.2]]M** VIC shares to VinSpeed and **[[165.7]]M** to VinEnergo. While these are VIC-level transactions, they reflect a corporate culture where the Chairman exercises outsized influence across the ecosystem. Minority shareholders in VHM face opacity in understanding true economics of BCC arrangements and related-party transactions.\n\n**2. Earnings lumpiness and cyclical risk.** Q1 2026 PAT of **[[25,552]]B** VND was **[[866]]%** higher YoY — but this reflects concentrated mega-project handover timing, not a sustainable quarterly run-rate. Property developer earnings are inherently lumpy. If macro conditions weaken or project delays occur, the **[[59,400]]B** VND FY2026 target could be at risk.\n\n**3. Gross margin compression.** GPM declined from **[[32]]%** (FY2024) to **[[29]]%** (FY2025), driven by project mix shifts and lower BCC profit sharing. If newer projects carry lower margins, sustained compression could disappoint even with revenue growth.\n\n**4. Rising leverage.** Net D/E increased from **[[23]]%** to **[[41]]%** (FY2025F), and is projected at **[[50.3]]%** by FY2026F before moderating. The Vietnam central bank has cut credit growth targets to **[[15]]%** amid asset bubble warnings. Higher interest rates or tighter credit could increase financing costs and slow demand.\n\n**5. Regulatory risk.** Vietnam is implementing new real estate laws including market-based land pricing frameworks that could increase land clearance costs. The government has also signaled tax policies to tackle speculation. While these reforms improve transparency, they may compress developer margins or slow project approvals.\n\n**6. Foreign ownership limits and liquidity.** Foreign investors have been net sellers of VHM (VND**[[19.4]]T** net sold in 2024). Vietnam's foreign ownership limits and periodic capital controls can create price dislocations and limit upside from global capital flows.","evidence_ids":["src_vietcap_vic_corporate","src_vinhomes_q4_2025","src_vietnam_macro_2026","src_maybank_peers_dec2024"],"confidence":0.78,"importance":"high","display_order":5,"created_at":"2026-05-03T09:48:30.170825537+00:00"},{"id":"block_open_questions","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","kind":"open_questions","title":"Open Questions: What We Could Not Fully Verify","body":"**1. BCC economics and Vingroup dependency.** The most material uncertainty is the true economics of business cooperation contracts between Vinhomes and Vingroup. BCC profit sharing dropped from VND**[[19,137]]B** (FY2024) to VND**[[8,739]]B** (FY2025), a **[[54]]%** decline that is not fully explained in public disclosures. The contractual terms, pricing mechanisms, and transfer dynamics between these related entities remain opaque. This is a blocking uncertainty because either answer — BCCs are arm's-length or they are not — would materially change the investment thesis.\n\n**2. FY2026 target achievability.** Management targets VND**[[59,400]]B** net profit (+**[[41]]%** YoY). Q1 2026 delivered **[[43]]%** of this in one quarter, which could mean either the target is conservative or that Q1 was unusually strong due to handover timing. Without independent consensus data or granular quarterly guidance, we cannot assess the probability distribution around this target with high confidence.\n\n**3. Impact of new land pricing laws.** Vietnam's new market-based land pricing framework could increase costs for Vinhomes' 81% pipeline land bank (land not yet fully compensated). The magnitude of cost increases is not quantifiable from available sources, though broker research suggests it is a sector-wide headwind.\n\n**4. Foreign ownership and liquidity dynamics.** Foreign investors have been persistent net sellers of VHM. The interaction between foreign ownership limits, capital controls, and stock liquidity creates price dynamics that are difficult to model but could limit re-rating potential even on strong fundamentals.","evidence_ids":["src_vinhomes_q4_2025","src_vietcap_vic_corporate","src_vietcap_dec2025"],"confidence":0.65,"importance":"medium","display_order":6,"created_at":"2026-05-03T09:45:17.949480351+00:00"}],"final_stance":{"id":"b738fbce-b357-4983-ab36-29d75088d6df","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","stance":"neutral","horizon":"12-18 months","confidence":0.55,"summary":"Vinhomes is Vietnam's dominant real estate developer with exceptional near-term earnings visibility (VND186.4T unbilled backlog) and a forward P/E of 10-14x that appears attractive relative to smaller peers. FY2025 showed a sharp cyclical inflection and Q1 2026 was extraordinary. However, the stance is neutral rather than bullish due to: (1) a blocking uncertainty around BCC arrangement transparency with parent Vingroup, (2) rising leverage (Net D/E from 23% to 41%), and (3) inherent earnings lumpiness from mega-project handover timing. The stock offers a compelling growth-at-discount-price setup for investors who can underwrite the Vingroup relationship, but the governance opacity prevents a high-conviction directional call.","key_reasons":["Record contracted backlog of VND186.4T provides hard revenue visibility through 2027, not just projections","Forward P/E of 10-14x is a significant discount to Vietnamese RE peers (KDH 29x, NLG 26x) despite superior scale and ROE (17.4% vs 2-5% peers)","Q1 2026 PAT of VND25.6T already covers 43% of full-year target, suggesting the VND59.4T FY2026 guidance is achievable","Vietnam macro tailwinds are strong: GDP 7.83%, FDI +42.9% YoY, real estate sector upgraded to POSITIVE by multiple brokerages","29,500-hectare land bank and TOD strategy position the company for a decade of development runway"],"what_would_change":["BCC arrangement terms become publicly disclosed and show arm's-length pricing, removing the governance discount — would upgrade to bullish","Vietnam credit tightening materially impacts presales or handover timelines, causing FY2026 profit to miss target by >20% — would downgrade to bearish","Gross margin continues compressing below 25% on sustained basis, suggesting structural cost inflation — would downgrade to bearish","Vingroup ecosystem creates a material capital call on Vinhomes — would downgrade to bearish"],"disclaimer":"Research only. Not investment advice.","created_at":"2026-05-03T09:50:03.913803889+00:00"},"projections":[{"id":"proj_vhm_12m","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","entity_id":"entity_vhm","horizon":"12-18 months","metric":"Target Price (VND/share)","current_value":40900.0,"current_value_label":"VND40,900 (Maybank Dec 2024 reference)","unit":"VND","scenarios":[{"label":"bull","target_value":62000.0,"target_label":"62000.00 VND","probability":0.25,"rationale":"Full FY2026 target achieved, forward P/E re-rates to 12x on consensus 2027E EPS as market gains confidence in earnings durability. TOD catalysts and infrastructure news flow attract foreign inflows.","catalysts":["FY2026 profit exceeds VND59.4T target","Can Gio Metro Line approval triggers land value re-rating","Foreign ownership increases on MSCI review speculation"],"risks":["Credit tightening slows presales","BCC economics deteriorate"]},{"label":"base","target_value":50000.0,"target_label":"50000.00 VND","probability":0.5,"rationale":"FY2026 profit achieves ~90% of target (VND53,000B). Forward P/E stabilizes at 10-11x as market acknowledges backlog visibility but maintains governance discount. Stock re-rates modestly from current levels.","catalysts":["Steady quarterly handover progress","Dividend resumption announcement","Vietnam GDP remains above 6.5%"],"risks":["Margin compression continues","Foreign selling persists"]},{"label":"bear","target_value":30000.0,"target_label":"30000.00 VND","probability":0.25,"rationale":"FY2026 profit misses target by >20% due to handover delays or demand slowdown. Credit tightening and new land laws compress margins. Forward P/E de-rates to 7-8x on earnings disappointment.","catalysts":["Credit growth target cut further","Major project delay or legal issue","Vingroup capital call on VHM"],"risks":["BCC terms disclosed as unfavorable","Vietnam property cycle peaks"]}],"methodology":"Earnings power × multiple band on FY2026E EPS, cross-checked with P/B NAV approach","key_assumptions":["Vinhomes achieves at least 85% of FY2026 profit target (VND50,500B+)","Vietnam property market remains in recovery cycle with no major policy shock","BCC profit sharing stabilizes at VND8,000-12,000B annually","No material corporate governance event at Vingroup level"],"evidence_ids":["src_vinhomes_q4_2025","src_vietcap_dec2025","src_maybank_peers_dec2024","src_theinvestor_vinhomes_2026_target","src_yahoo_vhm"],"confidence":0.6,"disclaimer":"Research only. Not investment advice.","created_at":"2026-05-03T09:45:36.690168812+00:00"},{"id":"proj_vhm_12m_v2","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","entity_id":"entity_vhm","horizon":"12-18 months","metric":"Target Price (VND/share)","current_value":40900.0,"current_value_label":"VND40,900 (Maybank Dec 2024 reference)","unit":"VND","scenarios":[{"label":"bull","target_value":62000.0,"target_label":"62000.00 VND","probability":0.25,"rationale":"Full FY2026 target achieved, forward P/E re-rates to 12x on consensus 2027E EPS as market gains confidence in earnings durability. TOD catalysts and infrastructure news flow attract foreign inflows.","catalysts":["FY2026 profit exceeds VND59.4T target","Can Gio Metro Line approval triggers land value re-rating","Foreign ownership increases on MSCI review speculation"],"risks":["Credit tightening slows presales","BCC economics deteriorate"]},{"label":"base","target_value":50000.0,"target_label":"50000.00 VND","probability":0.5,"rationale":"FY2026 profit achieves ~90% of target (VND53,000B). Forward P/E stabilizes at 10-11x as market acknowledges backlog visibility but maintains governance discount. Stock re-rates modestly from current levels.","catalysts":["Steady quarterly handover progress","Dividend resumption announcement","Vietnam GDP remains above 6.5%"],"risks":["Margin compression continues","Foreign selling persists"]},{"label":"bear","target_value":30000.0,"target_label":"30000.00 VND","probability":0.25,"rationale":"FY2026 profit misses target by >20% due to handover delays or demand slowdown. Credit tightening and new land laws compress margins. Forward P/E de-rates to 7-8x on earnings disappointment.","catalysts":["Credit growth target cut further","Major project delay or legal issue","Vingroup capital call on VHM"],"risks":["BCC terms disclosed as unfavorable","Vietnam property cycle peaks"]}],"methodology":"Earnings power × multiple band on FY2026E EPS, cross-checked with P/B NAV approach","key_assumptions":["Vinhomes achieves at least 85% of FY2026 profit target (VND50,500B+)","Vietnam property market remains in recovery cycle with no major policy shock","BCC profit sharing stabilizes at VND8,000-12,000B annually","No material corporate governance event at Vingroup level"],"evidence_ids":["src_vinhomes_q4_2025","src_vietcap_dec2025","src_maybank_peers_dec2024","src_theinvestor_vinhomes_2026_target","src_yahoo_vhm"],"confidence":0.55,"disclaimer":"Research only. Not investment advice.","created_at":"2026-05-03T09:47:31.992063465+00:00"}],"counter_theses":[{"id":"7a73c830-42bb-400d-892e-25cf733bf673","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","stance_against":"bullish","summary":"The bear case centers on Vinhomes being a value trap disguised as growth. The company's earnings are highly cyclical and concentrated in mega-project handover timing, creating an illusion of sustainable growth that may not persist. The Vingroup parent relationship introduces governance opacity — BCC profit-sharing, bulk sales to related parties, and the Chairman's complex web of spin-off entities make it difficult for minority shareholders to assess true economic value. Gross margins are compressing (32% to 29%), leverage is rising (Net D/E from 23% to 41%), and the Vietnam central bank is tightening credit amid asset bubble concerns. At a trailing P/E of 26x, the market may already be pricing in peak earnings. If Vietnam's property cycle turns or project approvals slow, the stock could de-rate significantly.","supporting_evidence_ids":["src_vietcap_vic_corporate","src_vinhomes_q4_2025","src_yahoo_vhm","src_vietnam_macro_2026"],"why_we_reject_or_partially_accept":"We partially accept the governance concern — it is the primary reason the stock trades at a discount to smaller, cleaner peers. However, we reject the \"peak earnings\" framing because: (1) the VND186.4T unbilled backlog provides hard revenue visibility through 2027, not just projections; (2) Q1 2026 results (VND25.6T PAT) already cover 43% of the full-year target in one quarter; (3) the forward P/E of 10-14x is not pricing in peak multiples — it's pricing in skepticism that may be excessive given the backlog. The leverage concern is valid but manageable at 41% Net D/E for a property developer with VND186T in contracted unbilled sales.","residual_probability":0.25,"created_at":"2026-05-03T09:44:48.972864726+00:00"}],"uncertainty_entries":[{"id":"da19a379-168c-4e47-b58b-77ddd02d9bdd","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","question":"What is the true economics of BCC arrangements between Vinhomes and Vingroup?","why_it_matters":"BCC profit sharing contributed VND8,739B in FY2025 (down from VND19,137B in FY2024). The terms, pricing, and transfer mechanics of these arrangements are not fully transparent. If BCC economics deteriorate or Vingroup shifts projects away from VHM, reported earnings could be materially lower than headline figures suggest.","attempted_resolution":"Reviewed Vietcap research and Vinhomes earnings presentations. BCC arrangements involve Vinhomes providing development services for Vingroup-owned land, with profit shared per contract terms. Exact contractual terms are not publicly disclosed in detail. The decline in BCC profit sharing in FY2025 suggests some normalization.","blocking":true,"related_decision_criterion":"Balance sheet strength and leverage profile","created_at":"2026-05-03T09:44:52.901840040+00:00"},{"id":"31f936cc-3394-40d9-8bcf-e4b65448d82d","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","question":"Will Vinhomes achieve its VND59.4T FY2026 profit target?","why_it_matters":"The target implies +41% growth over FY2025. Q1 2026 already delivered VND25.6T (43% of target), but this was driven by concentrated mega-project handovers. If H2 2026 handover timing shifts or new sales slow due to tighter credit, the target could be missed. Achievement vs miss would significantly impact the stock's re-rating potential.","attempted_resolution":"Q1 2026 results are strong and the unbilled backlog of VND186.4T provides a foundation. However, property developer earnings are inherently lumpy and management targets are aspirational. No independent consensus data available to cross-check probability.","blocking":false,"related_decision_criterion":"Revenue and earnings growth durability through property cycles","created_at":"2026-05-03T09:44:56.211142085+00:00"},{"id":"08f74474-5a4b-4161-ad1f-1684eb2cd104","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","question":"What is the impact of Vietnam's new real estate laws and land pricing framework on Vinhomes' cost structure?","why_it_matters":"New market-based land pricing could increase land clearance costs for future projects. Vinhomes' massive 29,500 ha land bank includes land at various stages of compensation. If costs rise materially, margins could compress further from the already-declining 29% GPM.","attempted_resolution":"Broker reports (Maybank, Vietcap) note the new laws but do not quantify the margin impact for VHM specifically. The general view is that developers with completed land payments (like KDH) benefit, while those still clearing land face higher costs. VHM's land bank is 81% pipeline, suggesting significant future land payment exposure.","blocking":false,"related_decision_criterion":"Valuation relative to peers, history, and asset NAV","created_at":"2026-05-03T09:45:00.131435518+00:00"}],"methodology_note":{"id":"ff94f11e-d985-418a-abd0-e39adb513b11","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","approach":"Bottom-up fundamental analysis of Vinhomes JSC combining financial statement analysis, peer benchmarking, and macro/sector context. Data sourced from company filings, market data providers, Vietnamese financial news, and consensus estimates where available. Valuation uses relative multiples (P/E, P/B, EV/EBITDA) and asset-based NAV cross-check.","frameworks":["Financial statement analysis (income statement, balance sheet, cash flow)","Relative valuation (P/E, P/B, EV/EBITDA vs Vietnamese real estate peers)","Asset NAV approach (land bank revaluation)","Scenario analysis (bull/base/bear)"],"data_windows":["FY2022, FY2023, FY2024 annual results","Q1 2025 or latest quarterly if available","Market data as of May 2026","Consensus estimates where available"],"known_limitations":["Vietnamese GAAP (VAS) reporting may differ from IFRS in revenue recognition timing for property developers","Land bank NAV estimates are inherently subjective and depend on location assumptions","Consensus coverage for VHM may be thin outside major brokerages","Related-party transactions with Vingroup ecosystem may obscure true economics","HOSE liquidity data and short-interest data are limited vs developed markets"],"created_at":"2026-05-03T09:39:19.953813328+00:00"},"decision_criterion_answers":[{"id":"f5d4bdd3-1193-4a3e-9aca-b880964a10cd","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","criterion":"Business quality and competitive moat in Vietnam real estate","verdict":"confirmed","summary":"Vinhomes has an unassailable competitive position in Vietnam real estate. It owns the largest land bank (29,500 hectares), has sold 309,000 cumulative units over 15 years, and benefits from the Vingroup ecosystem's brand and infrastructure. The integrated township model — combining residential, commercial, and amenities — creates switching costs and brand premium that smaller peers cannot replicate. ROE of 17.4% vs peers at 2-5% demonstrates superior capital allocation.","supporting_block_ids":["block_thesis","block_financials","block_catalysts"],"supporting_evidence_ids":["src_vinhomes_q4_2025","src_theinvestor_vinhomes_2026_target","src_vietcap_dec2025"],"created_at":"2026-05-03T09:46:17.949754741+00:00"},{"id":"24b8c5a9-7b3b-42d0-b85b-43c22562b01f","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","criterion":"Revenue and earnings growth durability through property cycles","verdict":"partially_confirmed","summary":"FY2025 showed strong growth (revenue +51%, PAT +20%) and the VND186.4T unbilled backlog provides exceptional near-term visibility. However, earnings are inherently cyclical and lumpy — Q1 2026 PAT was +866% YoY due to concentrated handover timing. The 2020-2024 revenue CAGR of only 9.4% shows the downturn impact. Growth durability depends on sustained macro conditions and the ability to convert the massive land bank into sales, which is probable but not certain over a full cycle.","supporting_block_ids":["block_financials","block_catalysts"],"supporting_evidence_ids":["src_vinhomes_q4_2025","src_vinhomes_annual_report_2024","src_vinhomes_q1_2026"],"created_at":"2026-05-03T09:46:21.757488962+00:00"},{"id":"9c69fbe7-57a2-4b51-a79f-a067485d35a4","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","criterion":"Balance sheet strength and leverage profile","verdict":"partially_confirmed","summary":"Total assets of VND564T (FY2024) and the VND186.4T contracted backlog provide a strong asset base. However, leverage is rising — Net D/E increased from 23% to 41% (FY2025F) and is projected at 50% by FY2026F. The VND4,350B bond issuance for debt restructuring and Vietnam's tighter credit environment add financing risk. The balance sheet is adequate for current operations but leaves limited margin for error if the cycle turns.","supporting_block_ids":["block_financials","block_risks"],"supporting_evidence_ids":["src_vinhomes_annual_report_2024","src_vietcap_dec2025","src_vietnam_macro_2026"],"created_at":"2026-05-03T09:46:24.300605007+00:00"},{"id":"3534a286-1587-4e43-a40f-fef6592683ad","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","criterion":"Valuation relative to peers, history, and asset NAV","verdict":"confirmed","summary":"Vinhomes trades at a forward P/E of 10-14x, a significant discount to smaller peers like KDH (29x) and NLG (26x), despite superior scale and profitability. P/B of 1.8x is at a premium to peers (0.6-1.8x) but justified by ROE of 17.4%. On Vietcap's 2027E, P/E compresses to 9.2x. The valuation gap vs peers reflects governance concerns rather than fundamental weakness, creating an opportunity for investors who can underwrite the Vingroup relationship.","supporting_block_ids":["block_valuation"],"supporting_evidence_ids":["src_yahoo_vhm","src_vietcap_dec2025","src_mbs_kdh_2026","src_maybank_peers_dec2024"],"created_at":"2026-05-03T09:46:27.787114691+00:00"},{"id":"cd923a91-b23f-4ae3-810b-9ea0c6a688d7","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","criterion":"Near-term catalysts (new launches, policy tailwinds, regional expansion)","verdict":"confirmed","summary":"Multiple catalysts are in play: (1) mega-project launches including Vu Yen, Co Loa, and Green Paradise providing multi-year sales runway; (2) TOD strategy benefiting from planned metro/HSR infrastructure; (3) Vietnam macro tailwinds with 7.83% GDP growth and surging FDI; (4) potential dividend resumption after 3 years of conservation. The Q1 2026 earnings beat and the VND59.4T FY2026 target provide near-term positive catalysts.","supporting_block_ids":["block_catalysts"],"supporting_evidence_ids":["src_vinhomes_q1_2026","src_theinvestor_vinhomes_2026_target","src_vietnam_macro_2026","src_vietcap_dec2025"],"created_at":"2026-05-03T09:46:31.173234545+00:00"},{"id":"24b8d4e8-1a0f-4247-9c81-5b17e59fc39c","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","criterion":"Key risks (regulatory, liquidity, macro slowdown, related-party transactions)","verdict":"partially_confirmed","summary":"Risks are real but manageable at current valuation levels. The Vingroup governance concern is the most material — BCC opacity, Chairman's spin-off complexity, and related-party transactions create genuine uncertainty. Rising leverage and Vietnam's credit tightening are secondary concerns. Regulatory risks from new land laws could compress margins. However, the stock's valuation discount appears to already price in much of this risk, and the VND186.4T backlog provides a buffer against near-term earnings disappointment.","supporting_block_ids":["block_risks","block_open_questions"],"supporting_evidence_ids":["src_vietcap_vic_corporate","src_vinhomes_q4_2025","src_vietnam_macro_2026"],"created_at":"2026-05-03T09:46:34.235526436+00:00"}],"explanations":[{"id":"a4e5a614-054f-4d5d-bc7c-5893143d67cf","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"contracted_sales","display_name":"Contracted Sales","metric_name":"Contracted Sales","definition":"The total value of property sales contracts signed by the developer during a given period, before revenue is recognized.","meaning":"Higher contracted sales indicate strong demand for the developer's projects and predict future revenue as these contracts convert into deliveries. A decline may signal weakening market conditions or pricing pressure.","value_interpretation":"VND 205,300 billion in contracted sales reflects robust demand across Vinhomes' residential projects, suggesting healthy near-term revenue visibility.","good_threshold":"Context-dependent on project pipeline size and market cycle; growth above 10% year-over-year is generally positive for large developers.","current_value_assessment":"At VND 205,300 billion, contracted sales are strong and support the company's revenue guidance for the coming periods.","source_id":null,"created_at":"2026-05-03T09:51:28.771541316+00:00"},{"id":"be714cfb-cad7-4f12-b8c1-d5420ac7283d","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"ebitda","display_name":"EBITDA","metric_name":"EBITDA","definition":"Earnings Before Interest, Taxes, Depreciation, and Amortization — a measure of core operating profitability excluding non-cash and financing costs.","meaning":"EBITDA shows how much cash profit a company generates from its operations. It allows comparison between companies with different capital structures and tax situations. Higher EBITDA generally signals stronger operational efficiency.","value_interpretation":"VND 40,540 billion in EBITDA indicates Vinhomes generates substantial operating cash flow, supporting debt servicing and reinvestment capacity.","good_threshold":"EBITDA margin (EBITDA/Revenue) above 25% is considered healthy for real estate developers; absolute growth matters alongside margin trends.","current_value_assessment":"At VND 40,540 billion, EBITDA is solid and reflects the company's scale and operational leverage in the Vietnamese property market.","source_id":null,"created_at":"2026-05-03T09:51:32.760408472+00:00"},{"id":"deaec796-ebd0-4ba2-8592-22423a76c07c","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"eps","display_name":"EPS","metric_name":"EPS","definition":"Earnings Per Share — the portion of a company's net profit allocated to each outstanding share of common stock.","meaning":"EPS is a key driver of stock valuation. Rising EPS means the company is becoming more profitable on a per-share basis. Investors use EPS to calculate the P/E ratio and to compare profitability across companies of different sizes.","value_interpretation":"VND 6,221 EPS means each share earned that amount over the trailing period, forming the basis for the P/E valuation multiples in this report.","good_threshold":"Context-dependent on industry and growth stage; consistent EPS growth over multiple years is the key positive signal.","current_value_assessment":"At VND 6,221, EPS provides the trailing earnings base; the forward P/E of 13.77x implies the market expects meaningful EPS growth ahead.","source_id":null,"created_at":"2026-05-03T09:51:36.344844899+00:00"},{"id":"158a021f-2c82-4af7-a3c3-759da51493b4","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"gross_margin","display_name":"Gross Margin","metric_name":"Gross Margin","definition":"The percentage of revenue remaining after subtracting the direct cost of goods sold (for a developer, primarily land and construction costs).","meaning":"A higher gross margin means the company retains more from each unit of revenue before overhead and financing costs. For real estate developers, gross margins above 25% indicate pricing power and efficient land acquisition.","value_interpretation":"29% gross margin is healthy for a Vietnamese real estate developer, suggesting the company has reasonable land costs and can price projects at a premium.","good_threshold":"25–35% is a typical healthy range for large-scale residential developers in emerging markets.","current_value_assessment":"At 29%, gross margin is within the healthy range and indicates adequate pricing power and cost control.","source_id":null,"created_at":"2026-05-03T09:51:39.928170868+00:00"},{"id":"83a1ec39-1ff7-4789-a398-50720996caac","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"land_bank","display_name":"Land Bank","metric_name":"Land Bank","definition":"The total area of land owned or controlled by a real estate developer for current and future project development.","meaning":"A larger land bank provides longer runway for future development without needing new acquisitions. It is a key strategic asset for developers. Location quality matters as much as total area — prime urban land is far more valuable than peripheral plots.","value_interpretation":"29,500 hectares represents a very large land bank, giving Vinhomes multi-year development visibility and reducing dependence on new land purchases.","good_threshold":"Context-dependent on company scale; for a top-tier Vietnamese developer, several thousand hectares is typical — 29,500 hectares is among the largest in the country.","current_value_assessment":"At 29,500 hectares, Vinhomes holds one of the largest land banks in Vietnam, providing a strong foundation for sustained project launches.","source_id":null,"created_at":"2026-05-03T09:51:44.230125415+00:00"},{"id":"59ab5a53-6b40-464b-9ae6-fb94144b19e0","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"market_capitalization","display_name":"Market Capitalization","metric_name":"Market Capitalization","definition":"The total market value of a company's outstanding shares, calculated as share price multiplied by total shares outstanding.","meaning":"Market cap reflects what investors collectively believe the company is worth. It determines a company's size classification (large-cap, mid-cap, etc.) and is used as the denominator in valuation metrics like P/E and EV ratios.","value_interpretation":"VND 599,680 billion (approximately USD 24 billion) places Vinhomes among the largest listed companies in Vietnam by market value.","good_threshold":"No \"good\" or \"bad\" threshold — market cap is a size descriptor, not a quality indicator. Relative valuation (P/E, P/B) matters more.","current_value_assessment":"At VND 599,680 billion, Vinhomes is a large-cap stock and a dominant player in the Vietnamese real estate sector.","source_id":null,"created_at":"2026-05-03T09:51:47.915779703+00:00"},{"id":"9397a7ba-ecb1-4709-9a19-05da80e36311","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"net_debt_equity","display_name":"Net Debt/Equity","metric_name":"Net Debt/Equity","definition":"The ratio of a company's net debt (total debt minus cash) to its shareholders' equity, measuring financial leverage.","meaning":"A lower ratio means the company relies less on borrowed money relative to its own equity. A higher ratio indicates more leverage, which amplifies both returns and risk. For capital-intensive industries like real estate, moderate leverage is normal.","value_interpretation":"41% net debt/equity is moderate leverage for a real estate developer, indicating the company is not over-reliant on debt financing.","good_threshold":"Below 50% is generally considered conservative for developers; above 100% would signal elevated financial risk.","current_value_assessment":"At 41%, leverage is moderate and manageable, leaving room for additional borrowing if needed for expansion.","source_id":null,"created_at":"2026-05-03T09:51:51.522503730+00:00"},{"id":"bf240fd7-12f5-4456-9294-4ac193e31a2e","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"net_income","display_name":"Net Income","metric_name":"Net Income","definition":"The total profit remaining after all expenses, taxes, interest, and costs have been deducted from revenue — the \"bottom line.\"","meaning":"Net income is the ultimate measure of profitability. Consistent growth in net income indicates the company is becoming more efficient and profitable. It is the numerator in the EPS calculation and directly drives shareholder returns.","value_interpretation":"VND 42,111 billion in net income represents strong profitability for the full year, supporting dividend capacity and reinvestment.","good_threshold":"Year-over-year growth of 10%+ is positive; absolute level should be assessed relative to revenue (net profit margin) and peers.","current_value_assessment":"At VND 42,111 billion, net income is robust and forms the basis for the trailing P/E valuation of 26.18x.","source_id":null,"created_at":"2026-05-03T09:51:55.187499818+00:00"},{"id":"7646d85c-92fe-42c5-af57-021f35e0f01e","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"net_profit_target","display_name":"Net Profit Target","metric_name":"Net Profit Target","definition":"The company's publicly announced net profit goal for the upcoming fiscal year, set by management as a forward guidance figure.","meaning":"Management targets indicate the company's internal expectations for profitability. Meeting or exceeding targets typically supports the stock price; missing targets can lead to sell-offs. Targets also help analysts calibrate forward earnings estimates.","value_interpretation":"A target of VND 59,400 billion implies management expects roughly 41% growth over the prior year's net income, signaling confidence in project deliveries and market conditions.","good_threshold":"Targets should exceed prior-year results by a meaningful margin (10%+) to justify growth expectations; credibility depends on historical track record of meeting guidance.","current_value_assessment":"At VND 59,400 billion, the FY2026 net profit target implies ambitious but achievable growth given the contracted sales pipeline and unbilled backlog.","source_id":null,"created_at":"2026-05-03T09:51:59.966853191+00:00"},{"id":"71103e55-c0a1-435a-bbf2-c8552d6c52c7","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"p_e_forward","display_name":"P/E (Forward)","metric_name":"P/E (Forward)","definition":"The current share price divided by analysts' consensus estimate of earnings per share for the next 12 months.","meaning":"Forward P/E tells you how much investors are paying for each unit of expected future earnings. A lower forward P/E relative to peers or the company's own history may indicate undervaluation, assuming earnings estimates are reliable.","value_interpretation":"13.77x forward P/E is relatively low, suggesting the market is pricing Vinhomes at a discount to its expected earnings growth — potentially indicating undervaluation.","good_threshold":"Below 15x is often considered attractive for large-cap emerging market developers; above 25x may indicate overvaluation unless growth is exceptional.","current_value_assessment":"At 13.77x, the forward P/E is well below the trailing P/E (26.18x), implying significant expected earnings growth that is not yet priced in.","source_id":null,"created_at":"2026-05-03T09:52:04.097665824+00:00"},{"id":"cf1ef7c6-3026-46a0-b5a4-5572a8a18882","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"p_e_trailing","display_name":"P/E (Trailing)","metric_name":"P/E (Trailing)","definition":"The current share price divided by the actual earnings per share over the most recent 12-month period.","meaning":"Trailing P/E uses historical, confirmed earnings. It is more reliable than forward P/E but may not reflect the company's current trajectory if earnings are growing or declining rapidly. A large gap between trailing and forward P/E signals expected earnings inflection.","value_interpretation":"26.18x trailing P/E is moderate — not cheap on historical earnings, but the wide gap to the 13.77x forward P/E tells us the market expects a sharp earnings ramp.","good_threshold":"20–25x is typical for growth-oriented emerging market stocks; above 30x may signal overvaluation unless justified by high growth visibility.","current_value_assessment":"At 26.18x, the trailing P/E is slightly elevated, but this is misleading if forward earnings growth materializes as expected.","source_id":null,"created_at":"2026-05-03T09:52:08.397623641+00:00"},{"id":"ce21565a-b4de-4e6b-adcb-8c571b89ed85","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"revenue","display_name":"Revenue","metric_name":"Revenue","definition":"The total income generated from the sale of goods or services before any expenses are deducted — the \"top line\" of the income statement.","meaning":"Revenue growth is the primary indicator of a company's business momentum. For real estate developers, revenue recognition is tied to project delivery timelines, so revenue can be lumpy across quarters. Sustained revenue growth above GDP growth signals market share gains.","value_interpretation":"VND 154,102 billion in revenue demonstrates Vinhomes' dominant scale in the Vietnamese real estate market.","good_threshold":"Year-over-year growth above Vietnam's GDP growth rate (currently ~7–8%) indicates the company is outpacing the broader economy.","current_value_assessment":"At VND 154,102 billion, revenue is substantial and the foundation from which all profitability metrics are derived.","source_id":null,"created_at":"2026-05-03T09:52:11.977832322+00:00"},{"id":"424c22b2-7259-48c5-b750-f1afe0aa7914","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"metric","target_key":"vietnam_gdp_growth","display_name":"Vietnam GDP Growth","metric_name":"Vietnam GDP Growth","definition":"The year-over-year percentage change in Vietnam's gross domestic product, measuring the overall pace of economic expansion.","meaning":"GDP growth provides the macro backdrop for all domestic businesses. Strong GDP growth supports rising incomes, urbanization, and housing demand. For real estate developers, GDP growth above 6% typically correlates with healthy property demand.","value_interpretation":"7.83% GDP growth is exceptionally strong, placing Vietnam among the fastest-growing economies in Asia and creating a favorable environment for property demand.","good_threshold":"Above 6% is considered strong for an emerging market; below 4% would signal a slowdown that could pressure real estate demand.","current_value_assessment":"At 7.83%, Vietnam's GDP growth is robust and provides a strong tailwind for Vinhomes' residential development business.","source_id":null,"created_at":"2026-05-03T09:52:27.009748203+00:00"},{"id":"40efc1cd-bd83-4113-9626-ed17dc037e93","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"term","target_key":"pe","display_name":"P/E","metric_name":"P/E","definition":"Price-to-Earnings ratio — the share price divided by earnings per share, showing how much investors pay per unit of profit.","meaning":"A higher P/E means investors are paying more for each dollar of earnings, typically reflecting growth expectations. A lower P/E may indicate undervaluation or that the market sees higher risk. Compare P/E within the same industry for meaningful conclusions.","value_interpretation":"P/E ratios vary widely by sector and growth stage. In this report, the forward P/E of 13.77x suggests the market expects earnings growth that hasn't yet been priced into the stock.","good_threshold":"A P/E below 15x is often considered value for mature companies; above 25x may indicate growth expectations or overvaluation.","current_value_assessment":"P/E is the single most widely used valuation metric; in this report it anchors the forward valuation of 13.77x and trailing valuation of 26.18x for Vinhomes.","source_id":null,"created_at":"2026-05-03T09:52:31.137981136+00:00"},{"id":"f6accf84-3290-45dc-b547-759b033beaeb","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"term","target_key":"roe","display_name":"ROE","metric_name":"ROE","definition":"Return on Equity — net income divided by shareholders' equity, measuring how efficiently a company generates profit from the capital invested by shareholders.","meaning":"A higher ROE means the company is more efficient at turning shareholder capital into profits. It is a key measure of management effectiveness. However, very high ROE can be driven by excessive leverage rather than true operational efficiency.","value_interpretation":"ROE should be assessed alongside leverage (Net Debt/Equity) to determine if returns are driven by operational efficiency or financial engineering.","good_threshold":"Above 15% is generally considered good; above 20% is excellent for most industries.","current_value_assessment":"ROE is referenced in the peer comparison table; Vinhomes' ROE should be compared against regional developer averages to assess capital efficiency.","source_id":null,"created_at":"2026-05-03T09:52:34.923532834+00:00"},{"id":"30a83017-26be-4925-b089-b950495f5fa2","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"term","target_key":"roa","display_name":"ROA","metric_name":"ROA","definition":"Return on Assets — net income divided by total assets, measuring how efficiently a company uses its assets to generate profit.","meaning":"A higher ROA means the company squeezes more profit from each dollar of assets. For real estate developers, ROA tends to be lower than for tech companies due to the large asset base of land and properties. Compare within the same industry.","value_interpretation":"ROA for real estate developers is typically in the 2–5% range due to the capital-intensive nature of land holdings and construction projects.","good_threshold":"Above 5% is generally considered good; above 10% is excellent. Asset-heavy industries tend to have lower ROA.","current_value_assessment":"ROA appears in the peer analysis context; for capital-light businesses ROA tends to be higher, while asset-heavy developers like Vinhomes typically have lower ROA.","source_id":null,"created_at":"2026-05-03T09:52:38.501476172+00:00"},{"id":"15bab790-0c86-4c7f-a2c1-f3e5e1c13e0b","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"term","target_key":"revenue","display_name":"revenue","metric_name":"revenue","definition":"The total income a company earns from its normal business activities — selling goods or providing services — before any costs or expenses are deducted.","meaning":"Revenue is the starting point of the income statement. Consistent revenue growth signals strong demand and business expansion. For cyclical industries like real estate, revenue can be lumpy, so multi-year trends matter more than single-period figures.","value_interpretation":"Revenue measures the scale of a company's business operations. In this report, it is the foundation for calculating margins, growth rates, and valuation multiples.","good_threshold":"Revenue growth above the country's GDP growth rate (currently ~7–8% for Vietnam) indicates the company is gaining market share.","current_value_assessment":"Revenue is the top-line figure from which all profitability metrics flow; in this report Vinhomes' revenue of VND 154,102 billion anchors the entire financial analysis.","source_id":null,"created_at":"2026-05-03T09:52:42.750949512+00:00"},{"id":"6258e83b-c42c-45a6-9cbd-e31ac99006ec","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"term","target_key":"gross_margin","display_name":"gross margin","metric_name":"gross margin","definition":"The percentage of revenue remaining after subtracting the direct cost of goods sold, showing how much profit a company makes on each unit of sales before overhead.","meaning":"A higher gross margin means the company has stronger pricing power or lower direct costs. Declining gross margins may signal rising input costs (land, materials) or increased competition forcing lower prices.","value_interpretation":"Gross margin measures operational efficiency at the most basic level. For real estate, it reflects land acquisition costs and construction efficiency relative to selling prices.","good_threshold":"25–35% is a typical healthy range for large-scale residential developers in emerging markets.","current_value_assessment":"Gross margin of 29% in this report indicates Vinhomes retains nearly 30 cents of every revenue dollar after direct costs, which is healthy for the sector.","source_id":null,"created_at":"2026-05-03T09:52:46.404171360+00:00"},{"id":"1ce16799-a873-45ba-9a2c-596c52af05e4","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"term","target_key":"net_profit","display_name":"net profit","metric_name":"net profit","definition":"The \"bottom line\" — total profit after all expenses, taxes, interest, and costs have been deducted from revenue.","meaning":"Net profit is the ultimate measure of how much money a company actually makes. It is the figure from which dividends can be paid and retained earnings accumulate. Investors watch net profit growth closely as it directly drives EPS and stock price appreciation.","value_interpretation":"Net profit is the final measure of profitability. In this report, it underpins the P/E calculations and the forward profit target of VND 59,400 billion.","good_threshold":"Consistent year-over-year growth of 10%+ is positive; the net profit margin (net profit / revenue) should be compared against industry peers.","current_value_assessment":"Net profit of VND 42,111 billion is the bottom-line figure used to calculate EPS and valuation multiples in this report.","source_id":null,"created_at":"2026-05-03T09:52:50.284741554+00:00"},{"id":"7800e0e1-cb4b-4950-823e-63b818718225","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_0","display_name":"Total Revenue","metric_name":"Total Revenue","definition":"The total income generated from property sales and services before any expenses are deducted — the starting point of the income statement.","meaning":"Revenue is the foundation of all financial analysis. Consistent growth signals strong demand. For real estate developers, revenue recognition is tied to project delivery, so it can vary significantly between quarters and years.","value_interpretation":"Total Revenue in the KPI grid measures the scale of the company's business operations and is the basis for margin and growth calculations.","good_threshold":"Revenue growth above Vietnam's GDP growth (~7-8%) indicates the company is gaining market share.","current_value_assessment":"Total Revenue in the KPI grid shows the company's top-line performance across periods, enabling trend comparison.","source_id":null,"created_at":"2026-05-03T09:52:56.627891005+00:00"},{"id":"2159054f-1cf1-418f-bc22-afb692cd0116","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_1","display_name":"Total Revenue","metric_name":"Total Revenue","definition":"The year-over-year percentage change in total revenue, indicating the pace of business expansion or contraction.","meaning":"Revenue growth is the primary indicator of business momentum. Comparing to GDP growth and peer growth rates provides context on whether the company is outperforming or underperforming the market.","value_interpretation":"Revenue growth rate in the KPI grid contextualizes whether the company is expanding faster or slower than its historical trend and peers.","good_threshold":"Above 10% year-over-year is considered strong growth; negative growth signals potential demand weakness.","current_value_assessment":"Revenue growth rate in the KPI grid shows how fast the company's top line is expanding relative to the prior period.","source_id":null,"created_at":"2026-05-03T09:53:00.006816361+00:00"},{"id":"f746cde1-9f08-45f7-8b92-5116c232dc69","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_2","display_name":"Total Revenue","metric_name":"Total Revenue","definition":"The percentage change in revenue from the prior period, showing acceleration or deceleration in business growth.","meaning":"This metric highlights whether the company's growth is improving or deteriorating. A positive change means revenue expanded; a negative change means it contracted. The trend over multiple periods matters more than any single data point.","value_interpretation":"The revenue change percentage in the KPI grid shows the directional momentum of the company's sales performance.","good_threshold":"Positive and accelerating change is ideal; decelerating growth may signal market saturation or competitive pressure.","current_value_assessment":"Revenue change percentage in the KPI grid quantifies the magnitude and direction of revenue movement between periods.","source_id":null,"created_at":"2026-05-03T09:53:03.423938249+00:00"},{"id":"49bb797f-d05f-4716-8335-c0b65869159d","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_3","display_name":"Net Income (PAT)","metric_name":"Net Income (PAT)","definition":"Net Income, also called Profit After Tax (PAT), is the final profit remaining after all expenses, interest, and taxes have been deducted from revenue.","meaning":"PAT is the ultimate measure of profitability and the basis for EPS calculations and dividend payments. Investors track PAT growth to assess whether the company is becoming more or less profitable over time.","value_interpretation":"Net Income (PAT) in the KPI grid represents the company's actual earnings available to shareholders after all obligations are met.","good_threshold":"Consistent year-over-year growth of 10%+ is positive; the net profit margin should be compared against industry peers for context.","current_value_assessment":"Net Income (PAT) in the KPI grid shows the bottom-line profit across periods, reflecting overall profitability after all costs.","source_id":null,"created_at":"2026-05-03T09:53:07.285583876+00:00"},{"id":"8164ee3c-a0ca-4af5-8406-08f154f1f134","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_4","display_name":"Net Income (PAT)","metric_name":"Net Income (PAT)","definition":"The year-over-year percentage change in Profit After Tax, measuring the pace of profitability improvement or deterioration.","meaning":"PAT growth is the most closely watched earnings metric. Strong PAT growth, especially when outpacing revenue growth, indicates improving operational efficiency and margin expansion.","value_interpretation":"PAT growth rate in the KPI grid indicates whether the company is translating revenue into profit more efficiently over time.","good_threshold":"Above 15% year-over-year growth is considered strong; negative PAT growth is a warning sign unless explained by one-time factors.","current_value_assessment":"PAT growth rate in the KPI grid shows how quickly the company's profitability is expanding, which is a key driver of stock price appreciation.","source_id":null,"created_at":"2026-05-03T09:53:10.659014179+00:00"},{"id":"fe55cbab-f97f-412e-a94d-426f3d176565","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_5","display_name":"Net Income (PAT)","metric_name":"Net Income (PAT)","definition":"The percentage change in Profit After Tax from the prior period, showing whether profitability is accelerating or decelerating.","meaning":"This metric reveals the earnings trajectory. Consistent positive changes suggest sustainable profitability improvements, while erratic changes may indicate reliance on one-time gains or cyclical factors.","value_interpretation":"The PAT change percentage in the KPI grid shows the directional momentum of the company's earnings power.","good_threshold":"Positive and stable or accelerating change is ideal; volatile PAT changes may indicate inconsistent earnings quality.","current_value_assessment":"PAT change percentage in the KPI grid quantifies the magnitude of profit movement, helping assess earnings volatility and trajectory.","source_id":null,"created_at":"2026-05-03T09:53:13.749285327+00:00"},{"id":"a978a70a-5233-4071-9416-141f59241941","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_6","display_name":"Contracted Sales","metric_name":"Contracted Sales","definition":"The total value of property sale contracts signed during a period, representing demand before revenue is recognized upon delivery.","meaning":"Contracted sales are a leading indicator of future revenue. They reflect current market demand and buyer confidence. A growing contracted sales figure suggests the company's projects are well-received by the market.","value_interpretation":"Contracted Sales in the KPI grid measures near-term demand and predicts future revenue recognition as projects are delivered.","good_threshold":"Growth above 10% year-over-year is positive; contracted sales should ideally exceed recognized revenue to maintain a healthy backlog.","current_value_assessment":"Contracted Sales in the KPI grid shows the volume of property sales agreements signed, which is a leading indicator of future revenue.","source_id":null,"created_at":"2026-05-03T09:53:17.047850367+00:00"},{"id":"a1a3dce4-f11b-442a-becf-2827d00185a8","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_7","display_name":"Contracted Sales","metric_name":"Contracted Sales","definition":"The percentage change in contracted sales from the prior period, indicating whether buyer demand is accelerating or slowing.","meaning":"This metric tracks the momentum of new sales. Declining contracted sales growth, even if still positive, can be an early warning of softening demand. It is a key forward-looking indicator for revenue forecasting.","value_interpretation":"Contracted Sales change in the KPI grid is a forward-looking demand indicator that foreshadows future revenue trends.","good_threshold":"Positive growth indicates healthy demand; declining contracted sales may signal market slowdown or project timing issues.","current_value_assessment":"Contracted Sales change percentage in the KPI grid shows whether demand momentum is strengthening or weakening relative to the prior period.","source_id":null,"created_at":"2026-05-03T09:53:20.287127646+00:00"},{"id":"cdfb3963-e76d-4d31-a892-77636a37ab47","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_8","display_name":"Unbilled Sales","metric_name":"Unbilled Sales","definition":"The cumulative value of contracted sales not yet recognized as revenue because the properties have not been delivered to buyers.","meaning":"A large unbilled sales balance provides a cushion of guaranteed future revenue. It reduces uncertainty about near-term earnings and indicates that the company has already locked in a significant portion of its upcoming revenue.","value_interpretation":"Unbilled Sales in the KPI grid measures the contracted revenue backlog, providing high confidence in future revenue recognition.","good_threshold":"Unbilled sales equal to 1–2x annual revenue indicates strong medium-term revenue visibility.","current_value_assessment":"Unbilled Sales in the KPI grid represents the revenue backlog that has been contracted but not yet recognized, providing forward visibility.","source_id":null,"created_at":"2026-05-03T09:53:23.491637230+00:00"},{"id":"4b7b8dc7-d97f-4995-949e-984084c7abd4","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_9","display_name":"Unbilled Sales","metric_name":"Unbilled Sales","definition":"The change in unbilled sales from the prior period, showing whether the revenue backlog is expanding or contracting.","meaning":"A growing unbilled sales balance means the company is signing more contracts than it is delivering, building future revenue. A shrinking balance may mean deliveries are catching up with sales, which is not necessarily negative if revenue recognition accelerates.","value_interpretation":"The change in Unbilled Sales in the KPI grid indicates the net momentum of the company's contracted-but-not-delivered revenue pipeline.","good_threshold":"Growing unbilled sales indicate new contracts exceed revenue recognition; shrinking may indicate faster delivery or slowing demand.","current_value_assessment":"Unbilled Sales change in the KPI grid shows whether the backlog is growing (more new contracts than revenue recognized) or shrinking.","source_id":null,"created_at":"2026-05-03T09:53:27.458614030+00:00"},{"id":"45ca5fb3-13e1-48ad-8220-56589ef0bd47","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_10","display_name":"Gross Margin","metric_name":"Gross Margin","definition":"The percentage of revenue remaining after subtracting the direct cost of goods sold (land and construction costs for a developer).","meaning":"Gross margin reflects the company's ability to price its products above the direct cost of production. Higher margins indicate pricing power, efficient land acquisition, or favorable project mix. Declining margins may signal rising input costs or pricing pressure.","value_interpretation":"Gross Margin in the KPI grid measures fundamental profitability at the project level, before overhead and financing costs.","good_threshold":"25–35% is a typical healthy range for large-scale residential developers in emerging markets.","current_value_assessment":"Gross Margin in the KPI grid shows the percentage of revenue retained after direct costs, indicating pricing power and cost efficiency.","source_id":null,"created_at":"2026-05-03T09:53:30.730504360+00:00"},{"id":"29d11372-3bfa-4034-8298-b94dadaf5394","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_11","display_name":"Gross Margin","metric_name":"Gross Margin","definition":"The change in gross margin from the prior period, indicating whether the company is becoming more or less efficient at converting revenue into gross profit.","meaning":"Margin trends reveal operational efficiency improvements or cost pressures. Expanding margins suggest better pricing power or lower input costs, while contracting margins may indicate rising land/construction costs or competitive pricing pressure.","value_interpretation":"Gross Margin change in the KPI grid tracks the trajectory of core profitability efficiency over time.","good_threshold":"Stable or expanding gross margins are positive; margin compression below 25% for developers warrants attention.","current_value_assessment":"Gross Margin change in the KPI grid shows whether the company's cost efficiency and pricing power are improving or deteriorating.","source_id":null,"created_at":"2026-05-03T09:53:33.803803690+00:00"},{"id":"17a7fee7-73d1-4309-bed0-258fa8a6dcbb","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_12","display_name":"FY2026 Profit Target","metric_name":"FY2026 Profit Target","definition":"The company's publicly announced net profit goal for fiscal year 2026, set by management as forward guidance.","meaning":"Management profit targets signal internal confidence in the business outlook. Meeting or exceeding targets supports stock price confidence; missing targets can lead to analyst downgrades and selling pressure.","value_interpretation":"FY2026 Profit Target in the KPI grid represents management's commitment to a specific earnings outcome, which the market uses to set expectations.","good_threshold":"Targets should exceed prior-year results by 10%+ to justify growth expectations; credibility depends on historical track record.","current_value_assessment":"FY2026 Profit Target in the KPI grid shows management's forward guidance, which analysts use to calibrate earnings expectations.","source_id":null,"created_at":"2026-05-03T09:53:36.879713064+00:00"},{"id":"c4c062fe-2009-4c29-a56b-46690df47243","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:row_13","display_name":"Land Bank","metric_name":"Land Bank","definition":"The total area of land owned or controlled by the developer for current and future project development, measured in hectares.","meaning":"A large land bank provides a long runway for future project launches without needing new acquisitions. The quality and location of the land matters as much as the total area — prime urban land commands premium pricing.","value_interpretation":"Land Bank in the KPI grid measures the strategic asset base that underpins the company's multi-year development pipeline.","good_threshold":"Context-dependent on company scale; for a top-tier Vietnamese developer, several thousand hectares is substantial.","current_value_assessment":"Land Bank in the KPI grid shows the total development area available, which determines the company's long-term project pipeline.","source_id":null,"created_at":"2026-05-03T09:53:40.058450188+00:00"},{"id":"3814b7ef-ff24-4af5-b571-6ee211e38216","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:col_0","display_name":"Metric","metric_name":"Metric","definition":"The label identifying which financial metric is displayed in each row of the KPI grid table.","meaning":"The Metric column provides the descriptive label for each row, allowing readers to identify what financial measure (e.g., Revenue, Net Income, Gross Margin) the corresponding values refer to.","value_interpretation":"The Metric column is a descriptive label that identifies each financial measure in the KPI grid for easy reference.","good_threshold":"N/A — this is a label column, not a numeric metric.","current_value_assessment":"The Metric column labels each row in the KPI grid, identifying what financial measure is being reported.","source_id":null,"created_at":"2026-05-03T09:53:46.705884882+00:00"},{"id":"681070ab-df75-4dc7-8621-491f932f34ce","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:col_1","display_name":"Value","metric_name":"Value","definition":"The numeric value of the financial metric for the reporting period, expressed in the unit specified in the adjacent column.","meaning":"The Value column shows the actual reported figure for each metric. Readers should compare this against the Prior Period value and Change % to assess trends and performance.","value_interpretation":"The Value column presents the raw numeric data for each KPI, which should be interpreted alongside the unit, period, and change columns.","good_threshold":"N/A — interpretation depends on the specific metric shown in each row.","current_value_assessment":"The Value column displays the numeric value of each financial metric for the current reporting period.","source_id":null,"created_at":"2026-05-03T09:53:49.414237020+00:00"},{"id":"14c7382b-a110-430a-9a55-a92cc338be30","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:col_2","display_name":"Unit","metric_name":"Unit","definition":"The measurement unit for each financial metric, such as VND billion for monetary values, percentage for margins, or hectares for land area.","meaning":"The Unit column is essential for correctly interpreting the Value column. Without knowing the unit, the raw number has no meaning — VND 154,102 billion is very different from VND 154,102.","value_interpretation":"The Unit column contextualizes each metric's value, ensuring readers correctly interpret the scale of the numbers presented.","good_threshold":"N/A — this is a descriptor column that provides context for interpreting numeric values.","current_value_assessment":"The Unit column clarifies the measurement unit (VND billion, %, hectares) for each metric in the KPI grid.","source_id":null,"created_at":"2026-05-03T09:53:52.549143486+00:00"},{"id":"8f1a3f92-3106-4047-a832-2e64ccfdff5f","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:col_3","display_name":"Period","metric_name":"Period","definition":"The time period (fiscal year, quarter, or date) to which the reported metric value applies.","meaning":"The Period column tells you when the reported value applies. This is critical for comparing metrics across time — you need to know if you're looking at FY2024, FY2025, or a quarterly figure to make meaningful comparisons.","value_interpretation":"The Period column anchors each metric to a specific time frame, enabling accurate trend analysis and period-over-period comparison.","good_threshold":"N/A — this is a temporal reference column, not a numeric metric.","current_value_assessment":"The Period column identifies the time frame (fiscal year or quarter) for which each metric value is reported.","source_id":null,"created_at":"2026-05-03T09:53:55.889713307+00:00"},{"id":"5d14f953-87fa-40ef-9d43-951f3fd07c4d","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:col_4","display_name":"Prior Period","metric_name":"Prior Period","definition":"The value of the same metric from the immediately preceding reporting period, used as the baseline for calculating change.","meaning":"Prior Period values allow readers to assess trends. Comparing the current Value against the Prior Period reveals whether the company's financial metrics are improving, stable, or declining over time.","value_interpretation":"The Prior Period column provides the baseline for calculating the percentage change in each metric, revealing performance trends.","good_threshold":"N/A — this is a reference column for calculating the Change % metric.","current_value_assessment":"The Prior Period column shows the previous period's value, enabling comparison to assess whether the metric improved or deteriorated.","source_id":null,"created_at":"2026-05-03T09:53:58.995681479+00:00"},{"id":"dc85ed38-070a-4fd4-a72f-7275e39994c3","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:col_5","display_name":"Change %","metric_name":"Change %","definition":"The percentage change in a metric from the prior period to the current period, calculated as (Current - Prior) / Prior × 100.","meaning":"Change % is the most actionable column in the KPI grid because it shows momentum. Positive changes in revenue, profit, and margins are favorable. Negative changes warrant investigation. The magnitude of change matters — a 50% profit increase is far more significant than a 2% increase.","value_interpretation":"The Change % column quantifies the rate of improvement or deterioration in each KPI, providing the clearest signal of business momentum.","good_threshold":"Positive change is generally favorable for revenue and profit metrics; context-dependent for leverage ratios.","current_value_assessment":"The Change % column shows the period-over-period movement of each metric, highlighting which measures are improving or deteriorating.","source_id":null,"created_at":"2026-05-03T09:54:02.476829865+00:00"},{"id":"64f0c736-1238-4349-bcc9-a7d6e8e66643","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid:col_6","display_name":"Source","metric_name":"Source","definition":"The data source (e.g., company filings, analyst estimates, market data) from which each metric value is derived.","meaning":"The Source column provides transparency about data origins. Company-reported figures come from official filings, while consensus estimates come from analyst surveys. Knowing the source helps readers assess data reliability and timeliness.","value_interpretation":"The Source column ensures each metric is traceable to its origin, supporting data credibility and allowing readers to verify figures independently.","good_threshold":"N/A — this is a provenance column, not a numeric metric.","current_value_assessment":"The Source column identifies where each metric's data originates, ensuring transparency and verifiability of the reported figures.","source_id":null,"created_at":"2026-05-03T09:54:05.453388721+00:00"},{"id":"7cef96c7-8427-472b-ac79-368386d9983e","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid_v2:row_0","display_name":"Total Revenue","metric_name":"Total Revenue","definition":"The total income generated from property sales and services before any expenses are deducted — the starting point of the income statement.","meaning":"Revenue is the foundation of all financial analysis. Consistent growth signals strong demand. For real estate developers, revenue recognition is tied to project delivery, so it can vary significantly between quarters and years.","value_interpretation":"Total Revenue in KPI grid v2 provides an updated view of the company's sales performance for trend analysis.","good_threshold":"Revenue growth above Vietnam's GDP growth (~7-8%) indicates the company is gaining market share.","current_value_assessment":"Total Revenue in the KPI grid v2 shows the company's top-line performance with updated or supplementary data.","source_id":null,"created_at":"2026-05-03T09:54:08.319863540+00:00"},{"id":"18034b64-74be-46ce-8007-9c9a8473d9c2","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid_v2:row_1","display_name":"Total Revenue","metric_name":"Total Revenue","definition":"The year-over-year percentage change in total revenue, indicating the pace of business expansion or contraction.","meaning":"Revenue growth is the primary indicator of business momentum. Comparing to GDP growth and peer growth rates provides context on whether the company is outperforming or underperforming the market.","value_interpretation":"Revenue growth rate in KPI grid v2 contextualizes the company's expansion pace relative to its historical trend.","good_threshold":"Above 10% year-over-year is considered strong growth; negative growth signals potential demand weakness.","current_value_assessment":"Revenue growth rate in KPI grid v2 shows the pace of top-line expansion relative to the prior period.","source_id":null,"created_at":"2026-05-03T09:54:10.976992886+00:00"},{"id":"db371a55-6083-4a59-9d52-7bab776eb60c","run_id":"f2dbb94d-0ca7-4558-9191-5ff022e16f98","target_type":"artifact","target_key":"artifact:artifact_kpi_grid_v2:row_2","display_name":"Total Revenue","metric_name":"Total Revenue","definition":"The percentage
